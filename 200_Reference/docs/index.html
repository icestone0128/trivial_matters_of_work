<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Tool</title>
    <style>
        :root {
            --bg: #f4f9fd;
            --panel: #ffffff;
            --text: #152333;
            --muted: #5f7188;
            --line: #d9e7f2;
            --primary: #0072ce;
            --primary-dark: #005ca7;
            --primary-soft: #e5f2fb;
            --green: #27a278;
            --shadow: 0 18px 42px rgba(0, 62, 111, 0.11);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                linear-gradient(135deg, rgba(0, 114, 206, 0.13), transparent 32%),
                linear-gradient(315deg, rgba(39, 162, 120, 0.10), transparent 34%),
                var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
        }

        main {
            width: min(1080px, calc(100% - 36px));
            margin: 0 auto;
            padding: 52px 0;
        }

        h1 {
            margin: 0 0 10px;
            color: var(--primary);
            font-size: clamp(2rem, 4vw, 3.25rem);
            line-height: 1.2;
            font-weight: 800;
        }

        .subtitle {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
        }

        .table-wrap {
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
            padding: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        th,
        td {
            padding: 15px 16px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
        }

        th {
            width: 58%;
            background: #eef7fd;
            color: #263b52;
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        td:first-child {
            font-weight: 600;
            overflow-wrap: anywhere;
        }

        .open-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            border-radius: 6px;
            background: var(--primary);
            color: #ffffff;
            padding: 0 14px;
            font-size: 14px;
            font-weight: 800;
            text-decoration: none;
        }

        .open-link:hover {
            background: var(--primary-dark);
            color: #ffffff;
            text-decoration: none;
        }

        a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
        }

        a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            main {
                padding: 32px 0;
            }

            .table-wrap {
                padding: 10px;
            }

            table {
                min-width: 0;
            }

            th,
            td {
                padding: 14px 12px;
            }

            th:first-child,
            td:first-child {
                width: 62%;
            }

            .open-link {
                min-height: 34px;
                padding: 0 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>Design Tool</h1>
        <p class="subtitle">A shared index for engineering design utilities.</p>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Tool Name</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Screw Drive Types Design Instructions</td>
                        <td><a class="open-link" href="./design-screw-drive-types-design-instructions-ai-tool/">Open tool</a></td>
                    </tr>
                    <tr>
                        <td>Introduction Of Spring Design System</td>
                        <td><a class="open-link" href="./design-introduction-of-spring-design-system-ai-tool-20260527/">Open tool</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
