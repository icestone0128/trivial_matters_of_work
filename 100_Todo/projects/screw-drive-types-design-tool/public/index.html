<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Tool</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #667085;
            --line: #d9dee8;
            --accent: #2257c4;
            --accent-hover: #17439a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
        }

        main {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
            padding: 48px 0;
        }

        h1 {
            margin: 0 0 24px;
            font-size: 32px;
            line-height: 1.2;
            font-weight: 700;
        }

        .table-wrap {
            overflow-x: auto;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 10px 24px rgba(31, 41, 55, 0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 680px;
        }

        th,
        td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            vertical-align: middle;
        }

        th {
            width: 58%;
            background: #eef2f8;
            color: var(--muted);
            font-size: 13px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        tr:last-child td {
            border-bottom: 0;
        }

        td:first-child {
            font-weight: 600;
            overflow-wrap: anywhere;
        }

        a {
            color: var(--accent);
            font-weight: 700;
            text-decoration: none;
        }

        a:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <h1>Design Tool</h1>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Tool Name</th>
                        <th>Link</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Screw Drive Types Design Instructions</td>
                        <td><a href="./design-screw-drive-types-design-instructions-ai-tool/">Open tool</a></td>
                    </tr>
                    <tr>
                        <td>Introduction Of Spring Design System</td>
                        <td><a href="./design-introduction-of-spring-design-system-ai-tool-20260527/">Open tool</a></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
